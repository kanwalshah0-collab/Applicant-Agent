<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meet My AI Representative — Applicant Agent</title>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    /* ── Page overrides ── */
    body { background: #f0f2f5; }
    .container { max-width: 780px; padding-top: 32px; }

    /* ── Candidate header ── */
    .cand-header h1 { font-size: 1.9rem; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; }
    .cand-headline   { font-size: 1rem; color: var(--gray-500); margin-bottom: 14px; line-height: 1.5; }
    .meta-row   { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .meta-badge { background: var(--gray-100); color: var(--gray-700); border-radius: 20px; padding: 4px 12px; font-size: .82rem; border: 1px solid var(--gray-200); }
    .role-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .role-pills:last-of-type { margin-bottom: 0; }
    .pill--skill { background: #e0f2fe; color: #0369a1; }

    /* ── Chat ── */
    .chat-card   { padding: 0; overflow: hidden; }
    .chat-header { padding: 14px 22px; border-bottom: 1px solid var(--gray-100); font-size: .82rem; font-weight: 600; color: var(--gray-500); display: flex; align-items: center; gap: 8px; }
    .chat-dot    { width: 8px; height: 8px; border-radius: 50%; background: var(--green-600); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    #chat-window {
      height: 420px; overflow-y: auto; padding: 20px 22px;
      display: flex; flex-direction: column; gap: 12px;
      background: var(--gray-50);
    }
    .message { max-width: 78%; padding: 10px 15px; border-radius: 18px; font-size: .93rem; line-height: 1.5; word-break: break-word; }
    .message--agent    { background: #fff; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.07); color: var(--gray-900); }
    .message--recruiter { background: var(--teal-600); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message--typing   { color: var(--gray-400); font-style: italic; font-size: .85rem; align-self: flex-start; }

    .chat-input-row { display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--gray-100); background: #fff; }
    #recruiterInput {
      flex: 1; padding: 10px 16px; border: 1.5px solid var(--gray-200);
      border-radius: 24px; font-size: .93rem; outline: none;
      transition: border-color .15s; background: #fff; color: var(--gray-900);
    }
    #recruiterInput:focus { border-color: var(--teal-500); }
    #recruiterInput::placeholder { color: var(--gray-400); }
    #sendBtn { padding: 10px 24px; background: var(--teal-600); color: #fff; border: none; border-radius: 24px; font-size: .93rem; cursor: pointer; font-weight: 500; transition: opacity .15s; white-space: nowrap; }
    #sendBtn:hover:not(:disabled) { opacity: .88; }
    #sendBtn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Loading skeleton ── */
    .skel { background: linear-gradient(90deg, #f0f0f0 25%, #e4e4e4 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .skel-h1    { height: 36px; width: 55%; margin-bottom: 10px; }
    .skel-p     { height: 16px; width: 80%; margin-bottom: 8px; }
    .skel-p.s   { width: 40%; }
    .skel-badges { display: flex; gap: 8px; margin: 14px 0; }
    .skel-badge { height: 28px; width: 90px; border-radius: 20px; }
    .skel-row   { display: flex; gap: 8px; margin-top: 12px; }
    .skel-pill  { height: 26px; width: 80px; border-radius: 20px; }
    .skel-chat  { height: 240px; width: 100%; border-radius: 10px; }
    .skel-card  { background: #fff; border-radius: 16px; box-shadow: 0 1px 5px rgba(0,0,0,.07); padding: 24px 28px; margin-bottom: 16px; }

    /* ── Error / not-found ── */
    .err-card  { background: #fff; border-radius: 16px; box-shadow: 0 1px 5px rgba(0,0,0,.07); padding: 48px 28px; text-align: center; }
    .err-icon  { font-size: 3rem; margin-bottom: 14px; }
    .err-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; color: var(--gray-700); }
    .err-msg   { color: var(--gray-500); font-size: .93rem; margin-bottom: 24px; }

    /* ── Message content formatting ── */
    .msg-body p { margin: 0 0 5px; }
    .msg-body p:last-child { margin-bottom: 0; }
    .msg-body ul { margin: 2px 0 5px 16px; padding: 0; }
    .msg-body ul:last-child { margin-bottom: 0; }
    .msg-body li { margin-bottom: 3px; list-style: disc; line-height: 1.5; }

    /* ── Quick tags bar ── */
    .quick-tags {
      display: flex; flex-wrap: wrap; align-items: center;
      gap: 6px; padding: 8px 18px;
      background: #fafafa; border-top: 1px solid var(--gray-100);
    }
    .qt-label {
      font-size: .7rem; font-weight: 700; color: var(--gray-400);
      text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0;
    }
    .qtag {
      background: #fff; border: 1.5px solid var(--gray-200);
      color: var(--gray-600); border-radius: 20px;
      padding: 3px 11px; font-size: .78rem; font-weight: 500;
      cursor: pointer; font-family: inherit;
      transition: border-color .12s, color .12s, background .12s;
      white-space: nowrap;
    }
    .qtag:hover { border-color: var(--teal-500); color: var(--teal-700); background: var(--teal-50); }
    .qtag:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .cand-header h1 { font-size: 1.5rem; }
      #chat-window { height: 340px; }
      .message { max-width: 90%; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ═══ LOADING SKELETON ═══ -->
  <div id="loading-state">
    <div class="skel-card">
      <div class="skel skel-h1"></div>
      <div class="skel skel-p"></div>
      <div class="skel-badges">
        <div class="skel skel-badge"></div>
        <div class="skel skel-badge"></div>
        <div class="skel skel-badge"></div>
      </div>
      <div class="skel-row">
        <div class="skel skel-pill"></div>
        <div class="skel skel-pill"></div>
        <div class="skel skel-pill"></div>
      </div>
    </div>
    <div class="skel-card">
      <div class="skel skel-p"></div>
      <div class="skel skel-p"></div>
      <div class="skel skel-p s"></div>
    </div>
    <div class="skel-card">
      <div class="skel skel-chat"></div>
    </div>
  </div>

  <!-- ═══ ERROR STATE ═══ -->
  <div id="error-state" style="display:none">
    <div class="err-card">
      <div class="err-icon" id="err-icon">⚠️</div>
      <p class="err-title" id="err-title">Something Went Wrong</p>
      <p class="err-msg"   id="err-msg">Could not load this profile.</p>
      <button class="button-primary" id="err-retry" onclick="window.location.reload()" style="display:none;margin-bottom:10px">
        Retry
      </button>
      <a class="button-secondary" href="/" style="display:inline-block;text-decoration:none">Go Home</a>
    </div>
  </div>

  <!-- ═══ PROFILE CONTENT (revealed after data loads) ═══ -->
  <div id="profile-content" style="display:none">

    <!-- ── Header card ── -->
    <div class="card cand-header" style="margin-bottom:16px">
      <h1 id="cand-name"></h1>
      <p  id="cand-headline" class="cand-headline"></p>
      <div id="cand-meta"  class="meta-row"></div>
      <div id="cand-roles" class="role-pills"></div>
      <div id="cand-skills" class="role-pills"></div>
    </div>

    <!-- ── Chat card ── -->
    <section class="card chat-card">
      <div class="chat-header">
        <div class="chat-dot"></div>
        <span id="chat-header-label">AI Representative — online now</span>
      </div>
      <div id="chat-window" role="log" aria-live="polite" aria-label="Conversation"></div>
      <div class="quick-tags">
        <span class="qt-label">Ask about</span>
        <button class="qtag" onclick="sendQuickTag('List all projects from the resume with a one-line summary for each.')">📁 Projects</button>
        <button class="qtag" onclick="sendQuickTag('List all technical and professional skills from the resume, grouped by category.')">🛠 Skills</button>
        <button class="qtag" onclick="sendQuickTag('Summarize the work experience — each role, company, and key responsibilities.')">💼 Experience</button>
        <button class="qtag" onclick="sendQuickTag('What is the educational background and any certifications or courses?')">🎓 Education</button>
        <button class="qtag" onclick="sendQuickTag('What are the salary expectations and non-negotiable requirements?')">💰 Salary & Terms</button>
      </div>
      <div class="chat-input-row">
        <input
          id="recruiterInput"
          type="text"
          placeholder="Tell me about the role…"
          autocomplete="off"
          aria-label="Your message"
          onkeydown="if(event.key==='Enter')sendMessage()"
        />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </section>

  </div><!-- /profile-content -->

</div><!-- /container -->

<script>
// ── Globals consumed by applicant-chat.js ────────────────────────────────────
window.CANDIDATE_ID          = null;
window.RECRUITER_ID_FALLBACK = null;
window.INITIAL_GREETING      = '';

(function init() {
  // Extract candidateId from /candidate/<id>
  var parts       = window.location.pathname.split('/').filter(Boolean);
  var candidateId = parts[1] || null; // ['candidate', '<id>']

  if (!candidateId) {
    showError('🔍', 'Candidate Not Found', 'No candidate ID found in this URL.', false);
    return;
  }

  window.CANDIDATE_ID = candidateId;

  // Stable recruiter ID stored per-candidate per-browser
  var ridKey = 'rid_' + candidateId;
  var rid    = localStorage.getItem(ridKey);
  if (!rid) {
    rid = 'r_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    localStorage.setItem(ridKey, rid);
  }
  window.RECRUITER_ID_FALLBACK = rid;

  // Fetch safe public profile JSON
  fetch('/candidate/' + candidateId + '/data')
    .then(function(res) {
      if (res.status === 404) return Promise.reject({ status: 404 });
      if (!res.ok)            return Promise.reject({ status: res.status });
      return res.json();
    })
    .then(function(profile) {
      // Set INITIAL_GREETING before loading chat script so init() sees it
      var name = profile.name || 'the candidate';
      window.INITIAL_GREETING =
        "Hi! I’m " + name + "’s AI representative. I’m here to help you " +
        "understand why they’d be an excellent fit for your team, and to discuss " +
        "opportunities that align with their goals. What role are you hiring for?";

      renderProfile(profile);

      document.getElementById('loading-state').style.display  = 'none';
      document.getElementById('profile-content').style.display = 'block';

      // Dynamically load chat script only after all globals are populated
      var s = document.createElement('script');
      s.src = '/applicant-chat.js';
      document.body.appendChild(s);
    })
    .catch(function(err) {
      if (err && err.status === 404) {
        showError('🔍', 'Candidate Not Found',
          'This link may be invalid or the profile may have been removed.', false);
      } else {
        showError('⚠️', 'Could Not Load Profile',
          'Check your connection and try again.', true);
      }
    });

  // ── DOM helpers ─────────────────────────────────────────────────────────────

  function renderProfile(p) {
    document.title = (p.name || 'Candidate') + ' — Meet My AI Representative';

    set('cand-name',     p.name     || 'Candidate');
    set('cand-headline', p.headline || '');

    // Meta badges
    var badges = [];
    if (p.location)  badges.push('📍 ' + p.location);
    workArrangementBadges(p.workArrangement).forEach(function(b) { badges.push(b); });
    if (p.seniority) badges.push('🏅 ' + p.seniority);
    var sal = fmtSalary(p.targetSalary);
    if (sal)         badges.push('💰 ' + sal);
    setHtml('cand-meta', badges.map(function(b) {
      return '<span class="meta-badge">' + esc(b) + '</span>';
    }).join(''));

    // Role pills
    var roles = (p.targetRoles || []).slice(0, 4);
    setHtml('cand-roles', roles.map(function(r) {
      return '<span class="pill">' + esc(r) + '</span>';
    }).join(''));

    // Top skills
    var topSkills = (p.topSkills || []).slice(0, 8);
    setHtml('cand-skills', topSkills.map(function(s) {
      return '<span class="pill pill--skill">' + esc(s) + '</span>';
    }).join(''));

    // Chat header
    var firstName = (p.name || 'the candidate').split(' ')[0];
    set('chat-header-label', firstName + '’s AI Representative — online now');
  }

  function showError(icon, title, msg, showRetry) {
    document.getElementById('loading-state').style.display = 'none';
    set('err-icon',  icon);
    set('err-title', title);
    set('err-msg',   msg);
    if (showRetry) document.getElementById('err-retry').style.display = 'inline-block';
    document.getElementById('error-state').style.display = 'block';
  }

  function set(id, txt) {
    var el = document.getElementById(id);
    if (el) el.textContent = txt;
  }
  function setHtml(id, html) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = html;
  }
  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function workArrangementBadges(list) {
    var LABELS = { remote: '🌐 Remote', onsite: '🏢 Onsite', hybrid: '🔁 Hybrid' };
    return (list || []).map(function(w) { return LABELS[w]; }).filter(Boolean);
  }
  function fmtSalary(sal) {
    if (!sal) return null;
    var f = function(n) { return n ? '$' + Math.round(n / 1000) + 'k' : null; };
    var lo = f(sal.min), hi = f(sal.max);
    if (lo && hi) return lo + '–' + hi;
    if (lo) return lo + '+';
    if (hi) return 'Up to ' + hi;
    return null;
  }
}());
</script>
</body>
</html>
